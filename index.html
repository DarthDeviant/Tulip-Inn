<script>
  // --- ORIGINAL COMPONENT SCRIPTS ---

  // SLIDESHOW
  const slideshows = {};
  function initSlideshow(id) {
    const el = document.getElementById('slideshow-' + id);
    if (!el) return;
    const imgs = Array.from(el.querySelectorAll('img'));
    const dotsEl = document.getElementById('dots-' + id);
    imgs.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'slide-dot' + (i === 0 ? ' active' : '');
      d.onclick = () => goTo(id, i);
      dotsEl.appendChild(d);
    });
    slideshows[id] = { imgs, dots: dotsEl.querySelectorAll('.slide-dot'), current: 0 };
    slideshows[id].timer = setInterval(() => slideMove(id, 1), 3500);
  }
  function goTo(id, idx) {
    const s = slideshows[id];
    s.imgs[s.current].classList.remove('active');
    s.dots[s.current].classList.remove('active');
    s.current = (idx + s.imgs.length) % s.imgs.length;
    s.imgs[s.current].classList.add('active');
    s.dots[s.current].classList.add('active');
    clearInterval(s.timer);
    s.timer = setInterval(() => slideMove(id, 1), 3500);
  }
  function slideMove(id, dir) { goTo(id, slideshows[id].current + dir); }
  ['pansy','lilac','lily'].forEach(initSlideshow);

  // FAQ
  function toggleFaq(btn) {
    const item = btn.closest('.faq-item');
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
    if (!isOpen) item.classList.add('open');
  }

  // NAV SCROLL & MOBILE MENU
  const nav = document.getElementById('mainNav');
  const menuToggle = document.getElementById('menuToggle');
  const navLinks = document.getElementById('navLinks');

  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  });

  menuToggle.addEventListener('click', () => {
    menuToggle.classList.toggle('active');
    navLinks.classList.toggle('active');
  });

  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', e => {
      const target = document.querySelector(link.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // Close mobile menu if open
        if (menuToggle.classList.contains('active')) {
          menuToggle.classList.remove('active');
          navLinks.classList.remove('active');
        }
      }
    });
  });

  // SCROLL ANIMATIONS
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => {
    observer.observe(el);
  });

  // --- MERGED PATCH SCRIPT (patch (3).js) ---

      "https://r1imghtlak.mmtcdn.com/8cfe0d3a-5d80-4fa5-b5ce-34ae9141760f.jpg",

    /* -- Hero background -- */

        const cur = getComputedStyle(heroBg).backgroundImage;
        heroBg.style.backgroundImage = cur.includes("url(")

          : `url('${HERO}')`;
      }
    }

    /* -- About photo -- */
    if (ABOUT) {

      if (aboutImg) aboutImg.src = ABOUT;

    /* -- Gallery images -- */
